version: '3.8'

services:
  app:
    build: .
    container_name: rentmate_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=rentmate
      - NODE_ENV=production
      - JWT_SECRET=supersecret123456789
      - JWT_EXPIRE=30d
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: rentmate_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: rentmate
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data: