name: CI/CD — Build & Deploy RentMate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: rentmate

jobs:
  # ─────────────────────────────────────────────────
  # 1. BUILD — build the Docker image and verify it
  # ─────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────
  # 2. TEST — spin up the full stack and run a smoke test
  # ─────────────────────────────────────────────────
  test:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start stack with docker compose
        run: docker compose up -d --build

      - name: Wait for app container to be stable
        run: |
          echo "Giving stack 45s to complete DB setup and start the server..."
          sleep 45
          docker compose ps
          docker compose logs app --tail=100

          # Gate: ensure the container is actually RUNNING (not restarting/exited)
          STATE=$(docker inspect rentmate_app --format='{{.State.Status}}')
          RESTARTS=$(docker inspect rentmate_app --format='{{.RestartCount}}')
          echo "Container state: $STATE | Restart count: $RESTARTS"
          if [ "$STATE" != "running" ]; then
            echo "ERROR: App container is not running (state=$STATE). Dumping full logs:"
            docker compose logs
            exit 1
          fi
          if [ "$RESTARTS" -gt 0 ]; then
            echo "ERROR: App container has restarted $RESTARTS time(s). Dumping full logs:"
            docker compose logs
            exit 1
          fi
          echo "Container is stable and running."

      - name: Smoke test — root page
        run: |
          # --retry-all-errors retries on ANY curl error (7=refused, 56=reset, etc.)
          curl \
            --retry 20 \
            --retry-delay 3 \
            --retry-all-errors \
            --retry-max-time 90 \
            --max-time 10 \
            --fail \
            --silent \
            --show-error \
            http://localhost:3000/
          echo "Root page OK"

      - name: Smoke test — items API returns success
        run: |
          RESPONSE=$(curl \
            --retry 10 \
            --retry-delay 3 \
            --retry-all-errors \
            --retry-max-time 60 \
            --max-time 10 \
            --fail \
            --silent \
            http://localhost:3000/api/items)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"success":true' \
            || (echo "Items API did not return success:true" && exit 1)
          echo "Items API OK"


      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────────
  # 3. PUBLISH — push image to Docker Hub (main only)
  # ─────────────────────────────────────────────────
  publish:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────
  # 4. DEPLOY — SSH into server and pull new image
  # ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/rentmate
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "Deployment complete at $(date)"
