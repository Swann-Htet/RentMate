name: CI/CD — Build & Deploy RentMate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: rentmate

jobs:
  # ─────────────────────────────────────────────────
  # 1. BUILD — build the Docker image and verify it
  # ─────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────
  # 2. TEST — spin up the full stack and run a smoke test
  # ─────────────────────────────────────────────────
  test:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start stack with docker compose
        run: |
          docker compose up -d --build
          echo "Waiting for app to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "App is up (HTTP $STATUS)"
              break
            fi
            echo "  Attempt $i: HTTP $STATUS — retrying in 3s..."
            sleep 3
          done

      - name: Smoke test — health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed!"
            docker compose logs app
            exit 1
          fi

      - name: Smoke test — items API
        run: |
          RESPONSE=$(curl -s http://localhost:3000/api/items)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"success":true' || (echo "Items API failed!" && docker compose logs app && exit 1)

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────────
  # 3. PUBLISH — push image to Docker Hub (main only)
  # ─────────────────────────────────────────────────
  publish:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────
  # 4. DEPLOY — SSH into server and pull new image
  # ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/rentmate
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "Deployment complete at $(date)"
